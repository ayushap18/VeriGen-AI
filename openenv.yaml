spec_version: 1
name: data-cleaning-agent
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: >
  A production-grade data cleaning and validation environment where AI agents
  learn to detect and fix errors in messy tabular datasets. Features dynamic
  task generation with procedural error injection, intelligent error detection
  with severity-ranked hints, undo/redo support, dataset validation, and
  multi-episode performance tracking. Tasks include fixing malformed dates,
  removing duplicates, correcting inconsistent categories, handling missing
  values, fixing type errors, and validating computed fields.
version: "2.0.0"
authors:
  - Codecatalysts
tags:
  - data-cleaning
  - data-validation
  - tabular-data
  - real-world
  - dynamic-generation
  - error-detection
tasks:
  - id: fix_dates_and_nulls
    difficulty: easy
    description: Fix malformed date formats and handle missing values in a small customer dataset.
  - id: dedup_and_normalize
    difficulty: medium
    description: Remove duplicate rows and normalize inconsistent category names in a product dataset.
  - id: full_pipeline_clean
    difficulty: hard
    description: Perform end-to-end cleaning — fix types, dates, duplicates, missing values, and outliers in a sales dataset.
  - id: dynamic
    difficulty: configurable
    description: Procedurally generated tasks with configurable size (10-500 rows), difficulty, and error types.
endpoints:
  - path: /reset
    method: POST
    description: Reset to a curated task (accepts empty body for default task)
  - path: /step
    method: POST
    description: Take a cleaning action
  - path: /state
    method: GET
    description: Get full environment state
  - path: /tasks
    method: GET
    description: List available curated tasks
  - path: /hints
    method: GET
    description: Detect errors and return severity-ranked hints
  - path: /validate
    method: GET
    description: Validate current dataset against expected types
  - path: /undo
    method: POST
    description: Undo the last action
  - path: /episodes
    method: GET
    description: Get multi-episode performance history
  - path: /generate
    method: POST
    description: Generate a dynamic task with procedural error injection
  - path: /health
    method: GET
    description: Detailed health check with capabilities
